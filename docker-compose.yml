services:

  report:
    image: openlmisrdc/report
    links:
      - db
      - log
    env_file: .env

  db:
    image: openlmis/postgres:14-debezium
    logging:
      driver: syslog
      options:
        syslog-address: "tcp://localhost:514"
        syslog-facility: "local1"
    depends_on: [log]
    env_file: .env

  log:
    image: openlmis/rsyslog:3
    ports:
      - "514:514"
    volumes:
      - '../logs/report:/var/log'
